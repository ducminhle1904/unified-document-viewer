services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    environment:
      PORT: 3000
      DATABASE_URL: /app/data/keyloop-scenario-d.sqlite
      UPSTREAM_TIMEOUT_MS: 800
    ports:
      - "3000:3000"
    volumes:
      - keyloop_api_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_BASE_URL: https://api-unified-docs.vantixs.com
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  keyloop_api_data:
